name: EMU-BIN Build

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/junfeng142/Demo-project.git
  REPO_BRANCH: nds
  PKG_NAME: nds
  EXTRA_NAME_1: scummvm
  EXTRA_NAME_2: openbor
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: false
  TZ: Asia/Shanghai
  
jobs:
  build:

    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@main
      
    - name: Initialization environment
      run: |
        sudo apt-get update
        sudo apt-get install -y -q --no-install-recommends build-essential make cmake wget autogen autoconf automake -y
        sudo apt-get -y autoremove
        sudo apt-get -y clean
        sudo rm -rf /var/lib/apt/lists/*
        sudo sed -i 's/# \(en_US.UTF-8\)/\1/' /etc/locale.gen
        sudo locale-gen --purge --lang en_US.UTF-8
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        
    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH --depth 1 $PKG_NAME
        git clone https://github.com/scummvm/scummvm.git -b master --depth 1 ${PKG_NAME}/$EXTRA_NAME_1
        mkdir -p $PKG_NAME/$EXTRA_NAME_2 && mkdir -p $PKG_NAME/_opk
        ln -sf /workdir/$PKG_NAME $GITHUB_WORKSPACE/$PKG_NAME
        cd && wget https://github.com/steward-fu/nds_miyoo/releases/download/assets/toolchain.tar.gz
        cd && tar xvf toolchain.tar.gz
        sudo mv mmiyoo /opt
        sudo mv prebuilt /opt
        export PATH=/opt/mmiyoo/bin/:$PATH
        cd && wget https://github.com/junfeng142/Demo-project/releases/download/2025.01.21-2345/FunKey-sdk-2.3.0.tar.gz
        cd && tar xvf FunKey-sdk-2.3.0.tar.gz
        sudo mv FunKey-sdk-2.3.0 /opt
        

    - name: Load custom configuration
      run: |
        mv configs/$EXTRA_NAME_1.* $PKG_NAME/$EXTRA_NAME_1/
        mv configs/$EXTRA_NAME_2.* $PKG_NAME/$EXTRA_NAME_2/
        cd $PKG_NAME/$EXTRA_NAME_1 && patch -p1 < $EXTRA_NAME_1.patch
        cd ../$EXTRA_NAME_2 
        wget https://github.com/DCurrent/openbor/archive/refs/tags/v6391.tar.gz
        tar xvf v6391.tar.gz
        patch -p1 < $EXTRA_NAME_2.patch

    - name: Compile the firmware
      id: compile
      run: |
        cd $PKG_NAME
        make cfg MOD=funkeys
        make MOD=funkeys
        cd $EXTRA_NAME_2 && chmod +x ./build.sh
        ./build.sh
        cd ../$EXTRA_NAME_1 && chmod +x ./build.sh
        ./build.sh
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DEVICE_NAME=$PKG_NAME" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        mv ${PKG_NAME}/drastic/libs $PKG_NAME/_opk/
        /opt/FunKey-sdk-2.3.0/bin/arm-funkey-linux-gnueabihf-strip ${PKG_NAME}/${EXTRA_NAME_1}/${EXTRA_NAME_1} -o $PKG_NAME/_opk/${EXTRA_NAME_1}
        /opt/FunKey-sdk-2.3.0/bin/arm-funkey-linux-gnueabihf-strip ${PKG_NAME}/${EXTRA_NAME_2}/openbor-6391/engine/$PKG_NAME -o $PKG_NAME/_opk/${EXTRA_NAME_2}
        mv $PKG_NAME/${EXTRA_NAME_1}/scummvm_miyoo.zip $PKG_NAME/_opk/
        cd $PKG_NAME/_opk
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT
        
    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: ${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
        
    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "status=success" >> $GITHUB_OUTPUT
        
    - name: Upload firmware to release
      uses: softprops/action-gh-release@v1
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: ${{ env.FIRMWARE }}/*.opk
